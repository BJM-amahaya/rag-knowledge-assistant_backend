services:
  # ─────────────────────────────────────
  # RAG Backend サービス
  # ─────────────────────────────────────
  rag-backend:
    # Dockerfileからイメージをビルド
    build:
      context: .
      dockerfile: Dockerfile

    # コンテナ名（docker ps で見えるときの名前）
    container_name: rag-backend

    # ポートマッピング: ホストの8000番 → コンテナの8000番
    ports:
      - "8000:8000"

    # 環境変数の設定
    # .env ファイルから読み込む
    env_file:
      - .env

    # ボリュームマウント（メタデータの永続化）
    volumes:
      - upload_metadata:/app/uploads

    # ヘルスチェック設定
    # コンテナが正常に動いているか定期的に確認する
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s      # 30秒ごとにチェック
      timeout: 10s        # 10秒以内に応答がなければ失敗
      retries: 3          # 3回連続失敗でunhealthy
      start_period: 40s   # 起動後40秒は猶予期間

    # コンテナが落ちたら自動で再起動
    restart: unless-stopped

# ─────────────────────────────────────
# 名前付きボリューム（データ保存場所）
# ─────────────────────────────────────
volumes:
  upload_metadata:    # メタデータ(metadata.json)の保存
